<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fecha Actual - Rosa Karina Rosas Burgueño</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #fde8ef;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      padding: 48px 56px 44px;
      width: min(420px, 90vw);
      opacity: 0;
      animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .acento {
      width: 36px;
      height: 2px;
      background: linear-gradient(90deg, #e8a0b0, #c8a0d8);
      border-radius: 2px;
      margin-bottom: 28px;
    }

    .hoy {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: #c090a8;
      margin-bottom: 4px;
    }

    .dia {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 10vw, 4rem);
      color: #7a5070;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
    }

    .fecha-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 28px;
    }

    .num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      color: #d07888;
    }

    .sep { font-size: 0.9rem; color: #ccc; font-weight: 300; }

    .mes {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      color: #80b0a8;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.07), transparent);
      margin-bottom: 22px;
    }

    .anio-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .anio-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #c8b0c0;
    }

    .anio {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      color: #e8a060;
      font-weight: 300;
      letter-spacing: -0.02em;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="acento"></div>
  <p class="hoy">Hoy es</p>
  <div class="dia" id="diaNombre">—</div>
  <div class="fecha-row">
    <span class="num" id="numeroDia">—</span>
    <span class="sep">de</span>
    <span class="mes" id="mesNombre">—</span>
  </div>
  <div class="divider"></div>
  <div class="anio-row">
    <span class="anio-label">del año</span>
    <span class="anio" id="anioValor">—</span>
  </div>
</div>

<script>
  const hoy = new Date();

  let nombreDia;
  switch (hoy.getDay()) {
    case 0: nombreDia = "domingo";   break;
    case 1: nombreDia = "lunes";     break;
    case 2: nombreDia = "martes";    break;
    case 3: nombreDia = "miércoles"; break;
    case 4: nombreDia = "jueves";    break;
    case 5: nombreDia = "viernes";   break;
    case 6: nombreDia = "sábado";    break;
  }

  let nombreMes;
  switch (hoy.getMonth()) {
    case  0: nombreMes = "Enero";      break;
    case  1: nombreMes = "Febrero";    break;
    case  2: nombreMes = "Marzo";      break;
    case  3: nombreMes = "Abril";      break;
    case  4: nombreMes = "Mayo";       break;
    case  5: nombreMes = "Junio";      break;
    case  6: nombreMes = "Julio";      break;
    case  7: nombreMes = "Agosto";     break;
    case  8: nombreMes = "Septiembre"; break;
    case  9: nombreMes = "Octubre";    break;
    case 10: nombreMes = "Noviembre";  break;
    case 11: nombreMes = "Diciembre";  break;
  }

  document.getElementById("diaNombre").textContent = nombreDia;
  document.getElementById("numeroDia").textContent  = hoy.getDate();
  document.getElementById("mesNombre").textContent  = nombreMes;
  document.getElementById("anioValor").textContent  = hoy.getFullYear();
</script>
</body>
</html>
